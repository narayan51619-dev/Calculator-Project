<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    <h1 align="center">Simple Calculator</h1>
    <p align="center">This is a calculator interface created Using HTML</p>
    <div align="center"><input  type="text" placeholder = "0" ></div>
    <table style="width:100px; border:2px solid black" align="center">    
    <tr>
        
           
        <td><input type="button" value="7"></td>
            <td><input type="button" value="8"></td>
            <td><input type="button" value="9"></td>
            <td><input type="button" value="/"></td></tr>
            <tr>
                
            <td><input type="button" value="4"></td>
            
            <td><input type="button" value="5"></td>
            <td><input type="button" value="6"></td>
            <td><input type="button" value="*"></td></tr>
            <tr>
            
            <td><input type="button" value="1"></td>
            <td><input type="button" value="2"></td>
            <td><input type="button" value="3"></td>
            <td><input type="button" value="-"></td></tr>
            <tr>
            

           <td> <input type="button" value="0"></td>
            <td><input type="button" value="."></td>
            <td><input type="button" value="="></td>
            <td><input type="button" value="+"></td> </tr>
            
              </table>  
            
    

        </body>
</html>
